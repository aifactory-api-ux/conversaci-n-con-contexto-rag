upstream auth_service {
    server auth-service:8001;
}

upstream query_service {
    server query-service:8002;
}

upstream document_service {
    server document-service:8003;
}

upstream conversation_service {
    server conversation-service:8004;
}

server {
    listen 80;
    server_name localhost;

    # Health check for the gateway itself
    location /health {
        return 200 '{"status":"healthy","service":"backend-gateway","version":"1.0.0"}';
        add_header Content-Type application/json;
    }

    # Auth service routes
    location /api/auth/ {
        proxy_pass http://auth_service/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    # Query service routes
    location /api/query/ {
        proxy_pass http://query_service/api/query/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    # Document service routes
    location /api/documents/ {
        proxy_pass http://document_service/api/documents/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        client_max_body_size 50M;
    }

    # Conversation service routes
    location /api/conversations/ {
        proxy_pass http://conversation_service/api/conversations/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    # Default location
    location / {
        return 404 '{"error":"Not found","message":"API endpoint not found"}';
        add_header Content-Type application/json;
    }
}
